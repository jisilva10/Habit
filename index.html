<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Habits">
  <meta name="theme-color" content="#F5F3F0">
  <meta name="description" content="Rastrea tus hábitos diarios. Visualiza rachas, progreso y construye rutinas duraderas.">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/public/icon.svg">
  <title>Habits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══════════════ HOME ═══════════════ -->
<div id="home" class="screen active">
  <header class="home-header">
    <div class="header-row">
      <div>
        <p class="greeting" id="greet">Buenos días</p>
        <h1 class="main-title">Habits</h1>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="refreshApp()" title="Actualizar" id="refreshBtn" aria-label="Actualizar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
            <path d="M21 3v5h-5"/>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
            <path d="M3 21v-5h5"/>
          </svg>
        </button>
        <button class="icon-btn accent" onclick="openAddModal()" title="Nuevo hábito" id="addHabitBtn" aria-label="Añadir hábito">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="today-card">
      <div class="today-left">
        <span class="today-eyebrow">HOY</span>
        <span class="today-date" id="todayLabel">—</span>
      </div>
      <div class="today-score-block">
        <span class="today-score" id="todayScore">—</span>
        <span class="today-score-label">completados</span>
      </div>
    </div>
  </header>

  <main class="habits-grid" id="habitsList">
    <div class="loading-state">
      <div class="spinner"></div>
      <span>Cargando…</span>
    </div>
  </main>
</div>

<!-- ═══════════════ DETAIL ═══════════════ -->
<div id="detail" class="screen">
  <div class="detail-header">
    <div class="detail-nav">
      <button class="back-btn" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Atrás
      </button>
      <div class="detail-nav-right">
        <button class="icon-btn sm" onclick="openEditModal()" title="Editar" aria-label="Editar hábito">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="detail-hero">
      <div class="detail-emoji-wrap" id="detailEmoji">—</div>
      <h2 class="detail-name" id="detailTitle">—</h2>
    </div>

    <div class="detail-stats">
      <div class="stat-item">
        <span class="stat-num" id="dPct">—</span>
        <span class="stat-lbl">Cumplimiento</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-num" id="dCurrent">—</span>
        <span class="stat-lbl">Racha actual</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-num" id="dBest">—</span>
        <span class="stat-lbl">Mejor racha</span>
      </div>
    </div>
  </div>

  <div class="detail-scroll">
    <div class="date-nav">
      <button class="dnav-btn" id="prevDay" onclick="shiftDay(-1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="curr-date" id="dateNavLabel">—</span>
      <button class="dnav-btn" id="nextDay" onclick="shiftDay(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>

    <div class="action-area">
      <button class="action-btn btn-done" id="btnDone" onclick="markDay(1)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="btnDoneLabel">Marcar hecho</span>
      </button>
      <button class="action-btn btn-undone" onclick="markDay(0)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Desmarcar
      </button>
    </div>

    <section class="section-block">
      <h3 class="section-title">Calendario</h3>
      <div class="cal-wrap">
        <div class="cal-grid" id="calDayNames"></div>
        <div style="height:5px;"></div>
        <div class="cal-grid" id="calCells"></div>
      </div>
    </section>

    <section class="section-block" style="padding-bottom:52px;">
      <h3 class="section-title">Días completados por semana</h3>
      <div class="chart-wrap">
        <canvas id="weekChart"></canvas>
      </div>
    </section>
  </div>
</div>

<!-- ═══════════════ MODAL: ADD HABIT ═══════════════ -->
<div class="overlay" id="addModal" onclick="bgClick(event,'addModal',closeAddModal)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Nuevo hábito</h2>
    <label class="field-label" for="habitName">Nombre</label>
    <input class="field-input" id="habitName" type="text" placeholder="ej. Leer 20 minutos" maxlength="40" autocomplete="off">
    <label class="field-label">Ícono</label>
    <div class="emoji-grid" id="emojiGrid"></div>
    <input class="field-input emoji-input" id="customEmoji" type="text" placeholder="O escribe tu propio emoji…" maxlength="4" autocomplete="off">
    <button class="primary-btn" id="submitHabit" onclick="submitNewHabit()">Crear hábito</button>
  </div>
</div>

<!-- ═══════════════ MODAL: EDIT HABIT ═══════════════ -->
<div class="overlay" id="editModal" onclick="bgClick(event,'editModal',closeEditModal)">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header-row">
      <h2 class="sheet-title" style="margin-bottom:0;">Editar hábito</h2>
      <button class="danger-text-btn" onclick="confirmDeleteHabit()">Eliminar</button>
    </div>
    <label class="field-label" for="editHabitName">Nombre</label>
    <input class="field-input" id="editHabitName" type="text" maxlength="40" autocomplete="off">
    <label class="field-label">Ícono</label>
    <div class="emoji-grid" id="editEmojiGrid"></div>
    <input class="field-input emoji-input" id="editCustomEmoji" type="text" placeholder="O escribe tu propio emoji…" maxlength="4" autocomplete="off">
    <button class="primary-btn" id="submitEdit" onclick="submitEditHabit()">Guardar cambios</button>
    <button class="ghost-btn" onclick="closeEditModal()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }
</script>
</body>
</html>
